# theme                     : "minimal-mistakes-jekyll"
remote_theme           : "mmistakes/minimal-mistakes@4.28.0"
minimal_mistakes_skin    : "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise", "catppuccin_latte", "catppuccin_mocha"

# Site Settings
locale                   : "zh-CN"
direction                : # "ltr" (default), "rtl" # set the direction of the page
title                    : "fw's Blog"
title_separator          : "-"
subtitle                 : "我草，还是github上的项目好用" # site tagline that appears below site title in masthead
name                     : "fw"
description              : "欢迎来到我的个人博客！"
url                      : # the base hostname & protocol for your site e.g. "https://fw.github.io"
baseurl                  : # the subpath of your site, e.g. "/blog"
repository               : "cleanwrite/minimal-mistakes" # 自动关联到你的GitHub仓库
teaser                   : # path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo                     : # path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
masthead_title           : # overrides the website title displayed in the masthead, use " " for no title
breadcrumbs              : true
words_per_minute         : 200
enable_copy_code_button  : true
copyright                : # "copyright" name, defaults to site.title
copyright_url            : # "copyright" URL, defaults to site.url

# 评论核心系统配置（已优化格式对齐）
comments:
  provider               : "giscus" # 切换评论系统为 giscus 权限讨论区
  disqus:
    shortname            : 
  discourse:
    server               : 
  facebook:
    appid                :
    num_posts            : 
    colorscheme          : 
  utterances:
    theme                : 
    issue_term           : 
  giscus:
    repo_id              : "R_kgDOS-jfew"      # 你的专属仓库 ID
    category_name        : "Announcements"     # 对应的讨论区分类名称
    category_id          : "DIC_kwDOS-jfew"    # 对应的分类 ID
    discussion_term      : "pathname"          # 保持默认，用页面路径关联讨论
    reactions_enabled    : "1"                 # 开启点赞回应 (1为开启)
    theme                : "light"             # 评论区皮肤，可选 light, dark 
    strict               : 0                   # 关闭严格匹配
    input_position       : "bottom"            # 输入框在评论列表底部
    emit_metadata        : 0                   # 不向父页面发送元数据
    lang                 : "zh-CN"             # 评论框界面强制显示为简体中文
    lazy                 : true                # 懒加载
  staticman:
    branch               : 
    endpoint             : 
reCaptcha:
  siteKey                :
  secret                 :
atom_feed:
  path                   : # blank (default) uses feed.xml
  hide                   : # true, false (default)
search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : true
algolia:
  application_id         : # YOUR_APPLICATION_ID
  index_name             : # YOUR_INDEX_NAME
  search_only_api_key    : # YOUR_SEARCH_ONLY_API_KEY
  powered_by             : # true (default), false
google:
  search_engine_id       : # YOUR_SEARCH_ENGINE_ID
  instant_search         : # false (default), true
# SEO Related
google_site_verification :
bing_site_verification   :
naver_site_verification  :
yandex_site_verification :
baidu_site_verification  :

# Social Sharing
twitter:
  username               :
facebook:
  username               :
  app_id                 :
  publisher              :
og_image                 : # Open Graph/Twitter default site image
og_image_alt             : # Alt text for Open Graph/Twitter default site image
social:
  type                   : # Person or Organization (defaults to Person)
  name                   : # If the user or organization name differs from the site's name
  links: # An array of links to social media profiles

# Analytics
analytics:
  provider               : # false (default), "google", "google-universal", "google-gtag", "custom"
  google:
    tracking_id          :
    anonymize_ip         : # true, false (default)


# Site Author
author:
  name               : "fw"
  avatar             : # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio                : "欢迎来到我的空间。"
  location           : "China"
  email              : "your.email@email.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-square-envelope"
      url: "mailto:your.email@email.com"      
    - label: "Website"
      icon: "fas fa-fw fa-link"
    - label: "Twitter"
      icon: "fab fa-fw fa-square-x-twitter"
    - label: "Facebook"
      icon: "fab fa-fw fa-square-facebook"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/cleanwrite"    
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"

# Site Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-square-x-twitter"
    - label: "Facebook"
      icon: "fab fa-fw fa-square-facebook"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/cleanwrite"    
    - label: "GitLab"
      icon: "fab fa-fw fa-gitlab"
    - label: "Bitbucket"
      icon: "fab fa-fw fa-bitbucket"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
  since: "2026"


# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - minimal-mistakes-jekyll.gemspec
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs # ignore Minimal Mistakes /docs
  - /test # ignore Minimal Mistakes /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"


# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false


# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false


# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed 
  quiet_deps: true
  silence_deprecations: ['import']


# Outputting
permalink: /:categories/:title/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones


# Pagination with jekyll-paginate
paginate: 5 # amount of posts to show
paginate_path: /page:num/

pagination:
  debug: false
  collection: 'posts'
  per_page: 10
  permalink: '/page/:num/'
  title: ':title - page :num'
  limit: 0
  sort_field: 'date'
  sort_reverse: true
  category: 'posts'
  tag: ''
  locale: ''
  trail:
    before: 2
    after: 2


# Plugins 
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache


# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/


# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development


# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true # 全局默认开启文章评论
      share: true
      related: true
