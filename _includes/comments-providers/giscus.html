<script>
  'use strict';

  (function () {
    var commentContainer = document.querySelector('#giscus-comments');

    if (!commentContainer) {
      return;
    }

    // 清空可能存在的旧内容（防止重复渲染）
    commentContainer.innerHTML = '';

    // 1. 创建并注入密码验证墙的 HTML 结构
    var gateDiv = document.createElement('div');
    gateDiv.id = 'vip-gate';
    gateDiv.style.cssText = 'margin-top: 2.5em; padding: 25px; border: 2px dashed #f0ad4e; background-color: #fcf8e3; border-radius: 6px; text-align: center;';
    gateDiv.innerHTML = 
      '<h3 style="margin-top: 0; color: #8a6d3b;"><i class="fas fa-key"></i> 内部内容：请输入专属验证码/密钥</h3>' +
      '<p style="color: #66512c; font-size: 0.95em;">本帖的追加讨论与隐藏核心资源已被锁定，请输入有效的邀请码或密钥进行解锁。</p>' +
      '<div style="margin: 20px 0;">' +
        '<input type="password" id="invite-code-input" placeholder="请输入密钥..." style="padding: 10px; width: 260px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px;" />' +
        '<button id="verify-btn" style="padding: 10px 20px; background-color: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; margin-left: 10px;">验证解锁</button>' +
      '</div>' +
      '<p id="verify-error-msg" style="color: #d9534f; display: none; font-weight: bold; margin-top: 10px;"><i class="fas fa-exclamation-triangle"></i> 密钥无效或已过期，请重新输入！</p>';

    // 2. 创建验证成功后用于展示内容的容器（加入防溢出最大高度和美化阴影）
    var contentDiv = document.createElement('div');
    contentDiv.id = 'vip-protected-content';
    contentDiv.style.cssText = 'display: none; margin-top: 2.5em; padding: 25px; border-left: 5px solid #5cb85c; background-color: #f4f9f4; border-radius: 6px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);';
    contentDiv.innerHTML = 
      '<h4 style="color: #3c763d; margin-top: 0; margin-bottom: 15px;"><i class="fas fa-unlock"></i> 验证成功！以下为隐藏讨论与核心资源</h4>' +
      '<div id="decrypted-payload"></div>';

    // 将这些元素塞入评论区容器中
    commentContainer.appendChild(gateDiv);
    commentContainer.appendChild(contentDiv);

    // 3. 动态引入 CryptoJS 用于本地安全 MD5 校验
    var cryptoScript = document.createElement('script');
    cryptoScript.src = 'https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js';
    cryptoScript.async = true;
    
    cryptoScript.onload = function() {
      var verifyBtn = document.getElementById('verify-btn');
      var inputField = document.getElementById('invite-code-input');

      if (verifyBtn && inputField) {
        // 核心验证逻辑抽取
        function doVerify() {
          var inputCode = inputField.value.trim();
          var errorMsg = document.getElementById('verify-error-msg');
          
          // 从当前文章的 Front Matter 中自动读取预设的邀请码 MD5 散列值
          var correctHash = "{{ page.invite_code_hash }}"; 
          
          if (!correctHash) {
            alert("这篇文章没有设置邀请码密钥。");
            return;
          }

          // 计算用户输入的邀请码的 MD5 值
          var inputHash = CryptoJS.MD5(inputCode).toString();

          if (inputHash === correctHash) {
            errorMsg.style.display = 'none';
            document.getElementById('vip-gate').style.display = 'none';
            document.getElementById('vip-protected-content').style.display = 'block';
            
            // 将 Jekyll 渲染出的 HTML 转为纯文本字符串注入
            var payload = {{ page.hidden_resource | markdownify | jsonify }};
            var payloadContainer = document.getElementById('decrypted-payload');
            
            // 💡 注入核心修改点：强制连续的长英文字符与长链接在容器边缘自动折行，防止撑爆文本框
            payloadContainer.style.cssText = 'word-break: break-all; word-wrap: break-word; line-height: 1.6; font-size: 15px;';
            payloadContainer.innerHTML = payload;
          } else {
            errorMsg.style.display = 'block';
            inputField.value = '';
            inputField.focus();
          }
        }

        // 绑定点击事件
        verifyBtn.addEventListener('click', doVerify);

        // 绑定回车键监听
        inputField.addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            doVerify();
          }
        });
      }
    };

    document.head.appendChild(cryptoScript);
  })();
</script>
